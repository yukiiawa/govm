name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  unit-tests:
    name: unit-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    env:
      ZIG_VERSION: 0.16.0-dev.3013+abd131e33

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-x64
            os: ubuntu-latest
            shell_kind: bash
          - name: ubuntu-arm64
            os: ubuntu-24.04-arm
            shell_kind: bash
          - name: windows-x64
            os: windows-latest
            shell_kind: pwsh
          - name: windows-arm64
            os: windows-11-arm
            shell_kind: pwsh
          - name: macos-intel
            os: macos-15-intel
            shell_kind: bash
          - name: macos-arm64
            os: macos-latest
            shell_kind: zsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Run unit tests (bash)
        if: matrix.shell_kind == 'bash'
        shell: bash
        run: zig build test

      - name: Run unit tests (zsh)
        if: matrix.shell_kind == 'zsh'
        shell: zsh
        run: zig build test

      - name: Run unit tests (pwsh)
        if: matrix.shell_kind == 'pwsh'
        shell: pwsh
        run: zig build test

  e2e:
    name: e2e-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    env:
      ZIG_VERSION: 0.16.0-dev.3013+abd131e33

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-bash-x64
            os: ubuntu-latest
            step_shell_kind: bash
            e2e_kind: sh
            install_fish: false
          - name: ubuntu-pwsh-x64
            os: ubuntu-latest
            step_shell_kind: pwsh
            e2e_kind: pwsh
            install_fish: false
          - name: ubuntu-fish-x64
            os: ubuntu-latest
            step_shell_kind: bash
            e2e_kind: fish
            install_fish: true
          - name: ubuntu-bash-arm64
            os: ubuntu-24.04-arm
            step_shell_kind: bash
            e2e_kind: sh
            install_fish: false
          - name: ubuntu-fish-arm64
            os: ubuntu-24.04-arm
            step_shell_kind: bash
            e2e_kind: fish
            install_fish: true
          - name: windows-pwsh-x64
            os: windows-latest
            step_shell_kind: pwsh
            e2e_kind: pwsh
            install_fish: false
          - name: windows-pwsh-arm64
            os: windows-11-arm
            step_shell_kind: pwsh
            e2e_kind: pwsh
            install_fish: false
          - name: macos-bash-intel
            os: macos-15-intel
            step_shell_kind: bash
            e2e_kind: sh
            install_fish: false
          - name: macos-fish-intel
            os: macos-15-intel
            step_shell_kind: bash
            e2e_kind: fish
            install_fish: true
          - name: macos-zsh-arm64
            os: macos-latest
            step_shell_kind: zsh
            e2e_kind: sh
            install_fish: false
          - name: macos-fish-arm64
            os: macos-latest
            step_shell_kind: bash
            e2e_kind: fish
            install_fish: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build govm (bash)
        if: matrix.step_shell_kind == 'bash'
        shell: bash
        run: zig build

      - name: Build govm (zsh)
        if: matrix.step_shell_kind == 'zsh'
        shell: zsh
        run: zig build

      - name: Build govm (pwsh)
        if: matrix.step_shell_kind == 'pwsh'
        shell: pwsh
        run: zig build

      - name: Install fish (Ubuntu)
        if: matrix.install_fish && runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y fish

      - name: Install fish (macOS)
        if: matrix.install_fish && runner.os == 'macOS'
        shell: bash
        run: brew install fish

      - name: Run E2E flow (sh)
        if: matrix.e2e_kind == 'sh' && matrix.step_shell_kind == 'bash'
        shell: bash
        run: |
          . .github/scripts/e2e.sh

      - name: Run E2E flow (sh via zsh)
        if: matrix.e2e_kind == 'sh' && matrix.step_shell_kind == 'zsh'
        shell: zsh
        run: |
          . .github/scripts/e2e.sh

      - name: Run E2E flow (fish)
        if: matrix.e2e_kind == 'fish'
        shell: bash
        run: fish .github/scripts/e2e.fish

      - name: Run E2E flow (pwsh)
        if: matrix.e2e_kind == 'pwsh'
        shell: pwsh
        run: .github/scripts/e2e.ps1

  cross-build-release-targets:
    name: cross-build-release-targets
    runs-on: ubuntu-latest
    env:
      ZIG_VERSION: 0.16.0-dev.3013+abd131e33

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build all release targets
        run: zig build release
