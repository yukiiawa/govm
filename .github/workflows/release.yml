name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        shell: pwsh
        run: .github/scripts/setup-zig.ps1

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag_name="${{ github.event.inputs.tag_name }}"
          else
            tag_name="${GITHUB_REF_NAME}"
          fi

          version="${tag_name#v}"

          echo "tag_name=${tag_name}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Run tests
        run: zig build test

      - name: Build release targets
        run: zig build release

      - name: Package release artifacts
        shell: bash
        run: |
          mkdir -p dist

          version="${{ steps.meta.outputs.version }}"

          for target_dir in zig-out/release/*; do
            target="$(basename "${target_dir}")"
            archive_base="govm-${version}-${target}"

            if [[ "${target}" == windows-* ]]; then
              (
                cd "${target_dir}"
                zip -9 -r "../../../dist/${archive_base}.zip" .
              )
            else
              tar -C "${target_dir}" -czf "dist/${archive_base}.tar.gz" .
            fi
          done

          (
            cd dist
            sha256sum * > SHA256SUMS.txt
          )

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          generate_release_notes: true
          files: |
            dist/*
